syntax = "proto3";

package speech.v1;

option go_package = "speech-recognition/internal/genproto/speechv1;speechv1";

// SpeechRecognition transcribes streamed PCM audio into text in real time.
service SpeechRecognition {
  // Recognize is a bidirectional stream: the client sends a configuration
  // message followed by audio frames, and the server streams back partial and
  // final transcription results as they become available.
  rpc Recognize(stream RecognizeRequest) returns (stream RecognizeResponse);
}

// RecognizeRequest carries either the initial configuration or a chunk of audio.
// The first message on the stream MUST be a config; every subsequent message
// MUST be audio_content.
message RecognizeRequest {
  oneof request {
    RecognitionConfig config = 1;
    // audio_content is little-endian 16-bit PCM, single channel, at the
    // sample rate declared in the config.
    bytes audio_content = 2;
  }
}

// RecognitionConfig declares the format of the audio that follows.
message RecognitionConfig {
  // sample_rate_hertz is the sampling rate of audio_content, e.g. 16000.
  // When zero, the server's default sample rate is used.
  int32 sample_rate_hertz = 1;
}

// RecognizeResponse is a single transcription result.
message RecognizeResponse {
  // text is the recognized transcript for the current utterance.
  string text = 1;
  // is_final reports whether text is a finalized result (true) or an
  // in-progress partial hypothesis (false).
  bool is_final = 2;
}
